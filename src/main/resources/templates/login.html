<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - DonaNeiva</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2ecc71',
                        secondary: '#f39c12',
                        dark: '#2c3e50',
                        light: '#ecf0f1'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-to-br from-dark to-gray-800 min-h-screen flex items-center justify-center py-12 px-4">
    <div class="fade-in max-w-md w-full">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-primary to-green-600 p-8 text-white text-center">
                <i class="fas fa-sign-in-alt text-4xl mb-3 block"></i>
                <h1 class="text-3xl font-bold">Ingresar</h1>
                <p class="text-sm opacity-90 mt-2">Bienvenido de vuelta a DonaNeiva</p>
            </div>

            <form class="p-8" method="post" th:action="@{/login}" action="/login">
                <div class="mb-6">
                    <label for="email" class="block text-dark font-semibold mb-2">
                        <i class="fas fa-envelope text-primary mr-2"></i>Correo electronico
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition"
                        placeholder="tu@email.com"
                    />
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-dark font-semibold mb-2">
                        <i class="fas fa-lock text-primary mr-2"></i>Contrasena
                    </label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition"
                            placeholder="********"
                        />
                        <button
                            type="button"
                            onclick="togglePassword()"
                            class="absolute right-3 top-3 text-gray-500 hover:text-primary"
                        >
                            <i class="fas fa-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-6 flex items-center">
                    <input
                        type="checkbox"
                        id="remember"
                        name="remember-me"
                        class="w-4 h-4 text-primary rounded focus:ring-2 focus:ring-primary"
                    />
                    <label for="remember" class="ml-2 text-gray-600">Recuerdame en este dispositivo</label>
                </div>

                <div th:if="${param.error}" class="mb-4 p-4 rounded-lg text-sm bg-red-100 text-red-700">
                    Correo o contrasena incorrectos.
                </div>

                <div th:if="${param.logout}" class="mb-4 p-4 rounded-lg text-sm bg-green-100 text-green-700">
                    Sesion cerrada correctamente.
                </div>

                <div th:if="${param.registroExitoso}" class="mb-4 p-4 rounded-lg text-sm bg-green-100 text-green-700">
                    Registro completado. Ahora puedes iniciar sesion.
                </div>

                <button
                    type="submit"
                    class="w-full bg-primary hover:bg-green-600 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 mb-4"
                >
                    <i class="fas fa-arrow-right mr-2"></i>Ingresar
                </button>

                <div class="relative mb-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">O</span>
                    </div>
                </div>

                <div class="text-center">
                    <p class="text-gray-600 mb-3">No tienes cuenta?</p>
                    <a
                        th:href="@{/#seccionRegistro}"
                        href="/#seccionRegistro"
                        class="w-full block bg-gray-200 hover:bg-gray-300 text-dark font-bold py-3 rounded-lg transition text-center"
                    >
                        <i class="fas fa-user-plus mr-2"></i>Crear Cuenta
                    </a>
                </div>

                <div class="text-center mt-6">
                    <a th:href="@{/}" href="/" class="text-primary hover:text-green-600 text-sm">
                        <i class="fas fa-arrow-left mr-1"></i>Volver al inicio
                    </a>
                </div>
            </form>
        </div>

        <div class="mt-8 text-center text-gray-300 text-sm">
            <p><i class="fas fa-lock text-primary mr-2"></i>Tus datos estan seguros y protegidos</p>
            <p class="mt-2"><a href="#" class="text-primary hover:text-green-600">Terminos de servicio</a> • <a href="#" class="text-primary hover:text-green-600">Privacidad</a></p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggle-icon');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
