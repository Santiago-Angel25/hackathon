<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Beneficiario - DonaNeiva</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F5F6FA] min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-3xl bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-[#2ECC71] text-white p-6 text-center">
        <h1 class="text-3xl font-bold">Registro Beneficiario</h1>
        <p class="text-sm opacity-90">Únete y encuentra ayuda</p>
    </div>

    <form class="p-8 space-y-6">

        <!-- NOMBRE (REGEX) -->
        <div>
            <label class="font-semibold text-[#2C3E50]">Nombre completo</label>
            <input type="text"
                   required
                   pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ ]{3,80}$"
                   title="Solo letras y espacios (mínimo 3 caracteres)"
                   class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                   placeholder="Ej: María Pérez">
        </div>

        <!-- DOCUMENTO (REGEX) -->
        <div>
            <label class="font-semibold text-[#2C3E50]">Documento</label>
            <input type="text"
                   required
                   pattern="^[0-9]{6,15}$"
                   title="Solo números (6 a 15 dígitos)"
                   class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                   placeholder="123456789">
        </div>

        <!-- TELÉFONO (REGEX) -->
        <div>
            <label class="font-semibold text-[#2C3E50]">Teléfono</label>
            <input type="tel"
                   required
                   pattern="^[0-9]{10}$"
                   title="Debe contener exactamente 10 números"
                   class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                   placeholder="Ej: 3001234567">
        </div>

        <!-- EMAIL (HTML5 NATIVO) -->
        <div>
            <label class="font-semibold text-[#2C3E50]">Correo electrónico</label>
            <input type="email"
                   required
                   class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                   placeholder="ejemplo@email.com">
        </div>

        <!-- DIRECCIÓN (REGEX) -->
        <div>
            <label class="font-semibold text-[#2C3E50]">Dirección</label>
            <input type="text"
                   required
                   pattern="^[A-Za-z0-9ÁÉÍÓÚáéíóúÑñ#.,\-\s]{5,100}$"
                   title="Dirección válida (mínimo 5 caracteres)"
                   class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                   placeholder="Dirección de residencia">
        </div>

        <!-- CONTRASEÑA (REGEX SEGURA) -->
        <div class="grid md:grid-cols-2 gap-4">

            <div>
                <label class="font-semibold">Contraseña</label>
                <input type="password"
                       required
                       pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,20}$"
                       title="Debe tener letras y números (6-20 caracteres)"
                       class="w-full mt-1 p-3 border rounded-xl">
            </div>

            <div>
                <label class="font-semibold">Confirmar contraseña</label>
                <input type="password"
                       required
                       class="w-full mt-1 p-3 border rounded-xl">
            </div>
        </div>

        <!-- TIPO DE NECESIDAD -->
        <div>
            <label class="font-semibold text-[#2C3E50]">¿Qué necesitas?</label>
            <select required
                    class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]">
                <option value="">Seleccionar</option>
                <option>Comida</option>
                <option>Ropa</option>
                <option>Medicamentos</option>
                <option>Otros</option>
            </select>
        </div>

        <!-- DESCRIPCIÓN (REGEX) -->
        <div>
            <label class="font-semibold text-[#2C3E50]">Descripción de la necesidad</label>
            <textarea required
                      pattern=".{10,300}"
                      title="Mínimo 10 caracteres"
                      class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                      placeholder="Describe tu situación"></textarea>
        </div>

        <!-- BOTÓN -->
        <a href="../templates/beneficiario.html"
           class="block text-center w-full bg-[#2ECC71] hover:bg-green-600 text-white font-bold p-3 rounded-xl transition">
            Registrarse
        </a>
    </form>
</div>

</body>
</html>
