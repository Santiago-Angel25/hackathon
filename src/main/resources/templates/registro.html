<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Neiva Solidaria</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2ecc71',
                        secondary: '#f39c12',
                        dark: '#2c3e50',
                        light: '#ecf0f1'
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .role-card { cursor: pointer; transition: all 0.3s ease; }
        .role-card.selected { transform: scale(1.05); box-shadow: 0 0 0 3px #2ecc71; }
    </style>
</head>
<body class="bg-gradient-to-br from-dark to-gray-800 min-h-screen py-12 px-4">
    <div class="fade-in max-w-2xl w-full mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fas fa-user-plus text-primary mr-3"></i>Crear Cuenta
            </h1>
            <p class="text-gray-300">Únete a la comunidad Neiva Solidaria</p>
        </div>

        <!-- Card Principal -->
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <form class="p-8" id="registro-form">
                <!-- Información Personal -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-dark mb-6 pb-4 border-b-2 border-primary">
                        <i class="fas fa-user text-primary mr-2"></i>Información Personal
                    </h2>

                    <!-- Nombre -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label for="nombre" class="block text-dark font-semibold mb-2">
                                <i class="fas fa-id-card text-primary mr-2"></i>Nombre Completo
                            </label>
                            <input
                                type="text"
                                id="nombre"
                                name="nombre"
                                required
                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition"
                                placeholder="Juan Pérez"
                            />
                        </div>

                        <!-- Teléfono -->
                        <div>
                            <label for="telefono" class="block text-dark font-semibold mb-2">
                                <i class="fas fa-phone text-primary mr-2"></i>Teléfono
                            </label>
                            <input
                                type="tel"
                                id="telefono"
                                name="telefono"
                                required
                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition"
                                placeholder="+57 300 123 4567"
                            />
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-6">
                        <label for="email" class="block text-dark font-semibold mb-2">
                            <i class="fas fa-envelope text-primary mr-2"></i>Correo Electrónico
                        </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition"
                            placeholder="tu@email.com"
                        />
                        <p class="text-xs text-gray-500 mt-1">Usarás esto para ingresar</p>
                    </div>

                    <!-- Contraseña -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="password" class="block text-dark font-semibold mb-2">
                                <i class="fas fa-lock text-primary mr-2"></i>Contraseña
                            </label>
                            <div class="relative">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    required
                                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition"
                                    placeholder="••••••••"
                                />
                                <button
                                    type="button"
                                    onclick="togglePassword('password')"
                                    class="absolute right-3 top-3 text-gray-500 hover:text-primary"
                                >
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label for="confirm-password" class="block text-dark font-semibold mb-2">
                                <i class="fas fa-lock text-primary mr-2"></i>Confirmar Contraseña
                            </label>
                            <div class="relative">
                                <input
                                    type="password"
                                    id="confirm-password"
                                    name="confirm-password"
                                    required
                                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-primary transition"
                                    placeholder="••••••••"
                                />
                                <button
                                    type="button"
                                    onclick="togglePassword('confirm-password')"
                                    class="absolute right-3 top-3 text-gray-500 hover:text-primary"
                                >
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seleccionar Rol -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-dark mb-6 pb-4 border-b-2 border-secondary">
                        <i class="fas fa-users text-secondary mr-2"></i>¿Cuál es tu Rol?
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Donador -->
                        <div
                            class="role-card p-6 border-2 border-gray-300 rounded-lg text-center hover:border-primary hover:shadow-lg transition"
                            onclick="selectRole(this, 'DONADOR')"
                        >
                            <i class="fas fa-gift text-4xl text-primary mb-3 block"></i>
                            <h3 class="font-bold text-dark mb-2">Donador</h3>
                            <p class="text-sm text-gray-600 mb-3">Comparte lo que tienes</p>
                            <input type="radio" name="rol" value="DONADOR" class="hidden" />
                        </div>

                        <!-- Beneficiario -->
                        <div
                            class="role-card p-6 border-2 border-gray-300 rounded-lg text-center hover:border-secondary hover:shadow-lg transition"
                            onclick="selectRole(this, 'BENEFICIARIO')"
                        >
                            <i class="fas fa-hands text-4xl text-secondary mb-3 block"></i>
                            <h3 class="font-bold text-dark mb-2">Beneficiario</h3>
                            <p class="text-sm text-gray-600 mb-3">Recibe la ayuda que necesitas</p>
                            <input type="radio" name="rol" value="BENEFICIARIO" class="hidden" />
                        </div>

                        <!-- Admin (solo lectura) -->
                        <div
                            class="p-6 border-2 border-gray-300 rounded-lg text-center opacity-50 cursor-not-allowed"
                            title="Solo accesible con autorización"
                        >
                            <i class="fas fa-shield text-4xl text-dark mb-3 block"></i>
                            <h3 class="font-bold text-dark mb-2">Administrador</h3>
                            <p class="text-sm text-gray-600 mb-3">Solo por invitación</p>
                        </div>
                    </div>

                    <input type="hidden" id="rol-input" name="rol" />
                </div>

                <!-- Términos -->
                <div class="mb-6 flex items-start">
                    <input
                        type="checkbox"
                        id="terminos"
                        name="terminos"
                        required
                        class="w-4 h-4 mt-1 text-primary rounded focus:ring-2 focus:ring-primary"
                    />
                    <label for="terminos" class="ml-3 text-gray-600 text-sm">
                        Acepto los <a href="#" class="text-primary hover:underline">términos de servicio</a> y la <a href="#" class="text-primary hover:underline">política de privacidad</a>
                    </label>
                </div>

                <!-- Botón Registrarse -->
                <button
                    type="submit"
                    class="w-full bg-primary hover:bg-green-600 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 mb-4"
                >
                    <i class="fas fa-user-check mr-2"></i>Crear Cuenta
                </button>

                <!-- Opción Ingresar -->
                <div class="text-center">
                    <p class="text-gray-600 mb-3">¿Ya tienes cuenta?</p>
                    <a
                        href="/login"
                        class="text-primary hover:text-green-600 font-semibold"
                    >
                        <i class="fas fa-sign-in-alt mr-1"></i>Ingresar aquí
                    </a>
                </div>

                <!-- Volver al inicio -->
                <div class="text-center mt-6">
                    <a href="/" class="text-gray-500 hover:text-primary text-sm">
                        <i class="fas fa-arrow-left mr-1"></i>Volver al inicio
                    </a>
                </div>
            </form>

            <!-- Mensaje de estado -->
            <div id="message" class="hidden px-8 pb-4">
                <div id="message-content" class="p-4 rounded-lg text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        // Toggle contraseña
        function togglePassword(id) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        // Seleccionar rol
        function selectRole(element, rol) {
            // Remover selección anterior
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected', 'border-primary', 'border-4', 'bg-green-50');
                card.classList.add('border-gray-300', 'border-2');
            });

            // Aplicar nueva selección
            element.classList.add('selected', 'border-4', 'border-primary', 'bg-green-50');
            element.classList.remove('border-2', 'border-gray-300');
            element.querySelector('input[type="radio"]').checked = true;
            document.getElementById('rol-input').value = rol;
        }

        // Manejar envío del formulario
        document.getElementById('registro-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validar que se seleccionó un rol
            const rol = document.getElementById('rol-input').value;
            if (!rol) {
                mostrarError('Por favor selecciona tu rol');
                return;
            }

            // Validar contraseñas
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                mostrarError('Las contraseñas no coinciden');
                return;
            }

            if (password.length < 6) {
                mostrarError('La contraseña debe tener al menos 6 caracteres');
                return;
            }

            const formData = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                password: password,
                rol: rol
            };

            try {
                const response = await fetch('/api/auth/registro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    mostrarExito('Cuenta creada exitosamente. Redirigiendo...');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    const error = await response.json();
                    mostrarError(error.message || 'Error al crear la cuenta');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al conectar. Intenta más tarde.');
            }
        });

        function mostrarError(mensaje) {
            const messageDiv = document.getElementById('message');
            const messageContent = document.getElementById('message-content');
            messageContent.textContent = mensaje;
            messageContent.className = 'p-4 rounded-lg text-sm bg-red-100 text-red-700';
            messageDiv.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function mostrarExito(mensaje) {
            const messageDiv = document.getElementById('message');
            const messageContent = document.getElementById('message-content');
            messageContent.textContent = mensaje;
            messageContent.className = 'p-4 rounded-lg text-sm bg-green-100 text-green-700';
            messageDiv.classList.remove('hidden');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
