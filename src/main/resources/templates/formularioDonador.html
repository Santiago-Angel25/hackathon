<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro Donador</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F6FA] min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-3xl bg-white rounded-2xl shadow-2xl overflow-hidden">
    <div class="bg-[#2ECC71] text-white p-6 text-center">
        <h1 class="text-3xl font-bold">Registro Donador</h1>
        <p class="text-sm opacity-90">Unete y empieza a ayudar</p>
    </div>

    <form id="registroDonadorForm" class="p-8 space-y-6">
        <div>
            <label class="font-semibold text-[#2C3E50]">Tipo de persona</label>
            <div class="flex gap-6 mt-2">
                <label class="flex items-center gap-2">
                    <input type="radio" name="tipoPersona" value="natural" required>
                    <span>Persona Natural</span>
                </label>
                <label class="flex items-center gap-2">
                    <input type="radio" name="tipoPersona" value="juridica">
                    <span>Persona Juridica</span>
                </label>
            </div>
        </div>

        <div>
            <label class="font-semibold text-[#2C3E50]">Nombre completo / Empresa</label>
            <input id="nombre" type="text" required class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                   placeholder="Ej: Juan Perez o Fundacion XYZ">
        </div>

        <div class="grid md:grid-cols-2 gap-4">
            <div>
                <label class="font-semibold">Tipo de documento</label>
                <select id="tipoDocumento" class="w-full mt-1 p-3 border rounded-xl" required>
                    <option value="">Seleccione</option>
                    <option value="Cedula">Cedula</option>
                    <option value="NIT">NIT</option>
                    <option value="Pasaporte">Pasaporte</option>
                </select>
            </div>
            <div>
                <label class="font-semibold">Numero</label>
                <input id="documento" type="text" required class="w-full mt-1 p-3 border rounded-xl" placeholder="123456789">
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-4">
            <div>
                <label class="font-semibold">Correo</label>
                <input id="email" type="email" required class="w-full mt-1 p-3 border rounded-xl" placeholder="correo@email.com">
            </div>
            <div>
                <label class="font-semibold">Telefono</label>
                <input id="telefono" type="tel" required class="w-full mt-1 p-3 border rounded-xl" placeholder="3001234567">
            </div>
        </div>

        <div>
            <label class="font-semibold">Direccion</label>
            <input id="direccion" type="text" required class="w-full mt-1 p-3 border rounded-xl" placeholder="Direccion de contacto">
        </div>

        <div class="grid md:grid-cols-2 gap-4">
            <div>
                <label class="font-semibold">Contrasena</label>
                <input id="password" type="password" required class="w-full mt-1 p-3 border rounded-xl">
            </div>
            <div>
                <label class="font-semibold">Confirmar contrasena</label>
                <input id="confirmPassword" type="password" required class="w-full mt-1 p-3 border rounded-xl">
            </div>
        </div>

        <p id="mensajeRegistro" class="text-sm font-medium"></p>

        <button type="submit" class="block text-center w-full bg-[#2ECC71] hover:bg-green-600 text-white font-bold p-3 rounded-xl transition">
            Registrarse
        </button>
    </form>
</div>

<script>
    document.getElementById('registroDonadorForm').addEventListener('submit', async event => {
        event.preventDefault();

        const mensaje = document.getElementById('mensajeRegistro');
        mensaje.textContent = '';
        mensaje.className = 'text-sm font-medium';

        const payload = {
            nombre: document.getElementById('nombre').value.trim(),
            email: document.getElementById('email').value.trim(),
            telefono: document.getElementById('telefono').value.trim(),
            direccion: document.getElementById('direccion').value.trim(),
            documento: `${document.getElementById('tipoDocumento').value}: ${document.getElementById('documento').value.trim()}`,
            tipoPersona: document.querySelector('input[name="tipoPersona"]:checked')?.value || '',
            password: document.getElementById('password').value,
            confirmPassword: document.getElementById('confirmPassword').value,
            rol: 'DONADOR'
        };

        try {
            const response = await fetch('/auth/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.message || 'No se pudo registrar el usuario');
            }

            window.location.href = '/login?registroExitoso';
        } catch (error) {
            mensaje.textContent = error.message;
            mensaje.classList.add('text-red-500');
        }
    });
</script>
</body>
</html>
