<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DonApp - Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow">
      <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="font-bold text-xl">DonApp</a>
        <nav class="space-x-4">
          <a href="/profile" class="text-sm text-gray-600 hover:text-gray-900">Perfil</a>
        </nav>
      </div>
    </header>

    <main class="container mx-auto p-6 space-y-6">
      <h2 class="text-xl font-semibold">Panel de administración</h2>

      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white rounded shadow p-4">Usuarios: 123</div>
        <div class="bg-white rounded shadow p-4">Donaciones activas: 42</div>
        <div class="bg-white rounded shadow p-4">Solicitudes pendientes: 5</div>
      </div>

      <section class="bg-white rounded shadow p-4">
        <h3 class="font-medium mb-2">Moderación de donaciones</h3>
        <table class="w-full text-left">
          <thead>
            <tr class="text-sm text-gray-600"><th>Id</th><th>Descripción</th><th>Acciones</th></tr>
          </thead>
          <tbody>
            <tr class="border-t"><td>1</td><td>Caja de ropa (Madrid)</td><td><button class="px-3 py-1 bg-green-600 text-white rounded">Aprobar</button> <button class="px-3 py-1 text-red-600">Rechazar</button></td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
