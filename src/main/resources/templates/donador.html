<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Donador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2ecc71',
                        dark: '#2c3e50',
                        light: '#ecf0f1'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F5F6FA] min-h-screen">
<nav class="bg-dark text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">DonaNeiva - Donador</h1>
    <div class="flex gap-3">
        <a href="/" class="bg-white/10 px-4 py-2 rounded inline-block text-white text-center">
            Ver Landing
        </a>
        <a href="/logout" class="bg-red-500 px-4 py-2 rounded inline-block text-white text-center">
            Cerrar sesion
        </a>
    </div>
</nav>

<div class="max-w-6xl mx-auto p-6">
    <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-8">
        <article class="bg-white rounded-2xl shadow-lg p-5">
            <p class="text-sm text-gray-500">Donaciones activas</p>
            <p id="stat-donaciones" class="text-3xl font-bold text-primary mt-2">0</p>
        </article>
        <article class="bg-white rounded-2xl shadow-lg p-5">
            <p class="text-sm text-gray-500">Usuarios registrados</p>
            <p id="stat-usuarios" class="text-3xl font-bold text-sky-600 mt-2">0</p>
        </article>
        <article class="bg-white rounded-2xl shadow-lg p-5">
            <p class="text-sm text-gray-500">Entregas realizadas</p>
            <p id="stat-entregas" class="text-3xl font-bold text-amber-500 mt-2">0</p>
        </article>
        <article class="bg-white rounded-2xl shadow-lg p-5">
            <p class="text-sm text-gray-500">Vidas impactadas</p>
            <p id="stat-vidas" class="text-3xl font-bold text-dark mt-2">0</p>
        </article>
    </section>

    <div class="mb-8 flex flex-wrap gap-4 justify-center">
        <a href="/publicar"
           class="bg-primary hover:bg-green-600 text-white px-8 py-4 rounded-xl text-lg font-bold transition">
            + Realizar donacion
        </a>
        <a href="/#mapa"
           class="bg-dark hover:bg-slate-700 text-white px-8 py-4 rounded-xl text-lg font-bold transition">
            Ver pedidos y mapa
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
        <h2 class="text-2xl font-bold text-dark mb-4">Mis Donaciones</h2>
        <div id="listaDonaciones" class="grid md:grid-cols-2 gap-4"></div>
    </div>
</div>

<script>
    async function cargarEstadisticas() {
        try {
            const response = await fetch('/api/estadisticas');
            const data = await response.json();
            document.getElementById('stat-donaciones').textContent = data.donacionesActivas ?? 0;
            document.getElementById('stat-usuarios').textContent = data.usuariosRegistrados ?? 0;
            document.getElementById('stat-entregas').textContent = data.entregasRealizadas ?? 0;
            document.getElementById('stat-vidas').textContent = data.vidasImpactadas ?? 0;
        } catch (error) {
            console.error('Error cargando estadisticas:', error);
        }
    }

    async function cargarDonaciones() {
        try {
            const response = await fetch('/donaciones');
            const data = await response.json();
            renderDonaciones(data);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function renderDonaciones(donaciones) {
        const container = document.getElementById('listaDonaciones');
        container.innerHTML = '';

        if (donaciones.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-center col-span-full">No has publicado donaciones aun</p>';
            return;
        }

        donaciones.forEach(d => {
            const card = document.createElement('div');
            card.className = 'border rounded-xl p-4 shadow hover:shadow-lg transition';

            const ubicacion = d.ubicacion
                ? `${d.ubicacion.latitud.toFixed(2)}, ${d.ubicacion.longitud.toFixed(2)}`
                : 'Sin ubicacion';

            card.innerHTML = `
                <h3 class="text-lg font-bold text-dark">${d.titulo}</h3>
                <p class="text-gray-600 text-sm mb-2">${d.descripcion}</p>
                <p class="text-sm">Cantidad: ${d.cantidad}</p>
                <p class="text-sm">Ubicacion: ${ubicacion}</p>
                <span class="inline-block mt-3 px-3 py-1 rounded-full text-sm font-semibold ${getColorEstado(d.estado)}">
                    ${getTextoEstado(d.estado)}
                </span>
            `;

            container.appendChild(card);
        });
    }

    function getColorEstado(estado) {
        if (estado === 'DISPONIBLE') return 'bg-green-100 text-green-700';
        if (estado === 'RESERVADO') return 'bg-yellow-100 text-yellow-700';
        if (estado === 'ENTREGADO') return 'bg-gray-200 text-gray-700';
        return 'bg-gray-100';
    }

    function getTextoEstado(estado) {
        if (estado === 'RESERVADO') return 'NO DISPONIBLE';
        return estado;
    }

    cargarDonaciones();
    cargarEstadisticas();
</script>
</body>
</html>
