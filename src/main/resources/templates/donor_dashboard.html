<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DonApp - Panel Donador</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow">
      <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="font-bold text-xl">DonApp</a>
        <nav class="space-x-4">
          <a href="/profile" class="text-sm text-gray-600 hover:text-gray-900">Perfil</a>
          <a href="/notifications" class="text-sm text-gray-600 hover:text-gray-900">Notificaciones</a>
        </nav>
      </div>
    </header>

    <main class="container mx-auto p-6 space-y-6">
      <h2 class="text-xl font-semibold">Publicar nueva donación</h2>
      <section class="bg-white rounded shadow p-4 max-w-2xl">
        <form action="/donations" method="post" enctype="multipart/form-data" class="space-y-4">
          <div>
            <label class="block text-sm">Foto</label>
            <input type="file" name="photo" accept="image/*" class="w-full" />
          </div>
          <div>
            <label class="block text-sm">Categoría</label>
            <select name="category" class="w-full border rounded px-3 py-2">
              <option>Comida</option>
              <option>Ropa</option>
              <option>Higiene</option>
              <option>Otros</option>
            </select>
          </div>
          <div>
            <label class="block text-sm">Descripción</label>
            <textarea name="description" class="w-full border rounded px-3 py-2" rows="3"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm">Latitud</label>
              <input name="lat" class="w-full border rounded px-3 py-2" />
            </div>
            <div>
              <label class="block text-sm">Longitud</label>
              <input name="lon" class="w-full border rounded px-3 py-2" />
            </div>
          </div>
          <div class="text-right">
            <button class="bg-blue-600 text-white px-4 py-2 rounded">Publicar</button>
          </div>
        </form>
      </section>

      <section>
        <h3 class="text-lg font-medium mb-2">Mis donaciones</h3>
        <div class="bg-white rounded shadow p-4 space-y-3">
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold">Caja de alimentos</div>
              <div class="text-sm text-gray-600">Comida — Madrid</div>
            </div>
            <div class="space-x-2">
              <select class="border rounded px-2 py-1">
                <option>disponible</option>
                <option>reservado</option>
                <option>entregado</option>
              </select>
              <button class="text-sm text-red-600">Eliminar</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
