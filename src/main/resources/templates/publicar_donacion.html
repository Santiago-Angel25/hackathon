<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DonaNeiva</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body class="bg-[#F5F6FA] min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-3xl bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-[#2ECC71] text-white p-6 text-center">
        <h1 class="text-3xl font-bold">DonaNeiva</h1>
        <p class="text-sm opacity-90">Plataforma de donaciones comunitarias</p>
    </div>

    <form id="donacionForm" class="p-8 space-y-6">

        <!-- TITULO -->
        <div>
            <label class="flex items-center gap-2 font-semibold text-[#2C3E50]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#3498DB]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-14L4 7m8 4v10m-8-10v10l8 4"/>
                </svg>
                Título
            </label>
            <input type="text" id="titulo" maxlength="100"
                   class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                   placeholder="Ej: Donación de alimentos">
            <p id="errorTitulo" class="text-red-500 text-sm"></p>
        </div>

        <!-- DESCRIPCION -->
        <div>
            <label class="flex items-center gap-2 font-semibold text-[#2C3E50]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#3498DB]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6M9 8h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"/>
                </svg>
                Descripción
            </label>
            <textarea id="descripcion" maxlength="300"
                      class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                      placeholder="Describe la donación"></textarea>
            <div class="flex justify-between text-xs text-gray-500">
                <span id="errorDescripcion" class="text-red-500"></span>
                <span id="contador">0 / 300</span>
            </div>
        </div>

        <!-- TIPO Y CANTIDAD -->
        <div class="grid md:grid-cols-2 gap-4">

            <div>
                <label class="flex items-center gap-2 font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#3498DB]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7l9-4 9 4-9 4-9-4zm0 0v10l9 4 9-4V7"/>
                    </svg>
                    Tipo
                </label>
                <select id="tipo" class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]">
                    <option value="">Seleccionar</option>
                    <option value="1">Comida</option>
                    <option value="2">Ropa</option>
                    <option value="3">Medicamentos</option>
                    <option value="4">Otros</option>
                </select>
                <p id="errorTipo" class="text-red-500 text-sm"></p>
            </div>

            <div>
                <label class="flex items-center gap-2 font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#3498DB]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V7a2 2 0 00-2-2H6a2 2 0 00-2 2v6m16 0v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6m16 0H4"/>
                    </svg>
                    Cantidad
                </label>
                <input type="number" id="cantidad" min="1"
                       class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-[#3498DB]"
                       placeholder="Ej: 10">
                <p id="errorCantidad" class="text-red-500 text-sm"></p>
            </div>

        </div>

        <!-- MAPA -->
        <div>
            <h3 class="flex items-center gap-2 font-semibold text-[#2C3E50]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#3498DB]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/>
                </svg>
                Punto de donación
            </h3>

            <div class="flex gap-2 mt-2">
                <button type="button" id="btnGps"
                        class="bg-[#3498DB] text-white px-3 py-2 rounded-lg text-sm">
                    Usar ubicación actual
                </button>

                <button type="button" id="btnReset"
                        class="bg-gray-200 px-3 py-2 rounded-lg text-sm">
                    Limpiar
                </button>
            </div>

            <div id="map" class="h-72 w-full rounded-xl border mt-3"></div>

            <p class="text-sm text-gray-500 mt-2">
                Lat: <span id="latText">-</span> | Lng: <span id="lngText">-</span>
            </p>

            <input type="hidden" id="latitud">
            <input type="hidden" id="longitud">
        </div>

        <a href="../templates/donador.html"
           class="block text-center w-full bg-[#2ECC71] hover:bg-green-600 text-white font-bold p-3 rounded-xl transition">
            Registrarse
        </a>

    </form>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map = L.map('map').setView([2.9386, -75.2811], 13);
    let marker;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

    map.on('click', e => setLocation(e.latlng.lat, e.latlng.lng));

    function setLocation(lat, lng){
        document.getElementById('latitud').value = lat;
        document.getElementById('longitud').value = lng;
        document.getElementById('latText').innerText = lat.toFixed(6);
        document.getElementById('lngText').innerText = lng.toFixed(6);

        if(marker) map.removeLayer(marker);
        marker = L.marker([lat, lng]).addTo(map);
    }

    document.getElementById('btnGps').addEventListener('click', () => {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            map.setView([lat, lng], 15);
            setLocation(lat, lng);
        });
    });

    document.getElementById('btnReset').addEventListener('click', () => {
        document.getElementById('latitud').value = '';
        document.getElementById('longitud').value = '';
        document.getElementById('latText').innerText = '-';
        document.getElementById('lngText').innerText = '-';
        if(marker) map.removeLayer(marker);
    });

    const desc = document.getElementById('descripcion');
    const contador = document.getElementById('contador');
    desc.addEventListener('input', () => {
        contador.innerText = `${desc.value.length} / 300`;
    });
</script>

</body>
</html>
