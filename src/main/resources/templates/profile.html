<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DonApp - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow">
      <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="font-bold text-xl">DonApp</a>
      </div>
    </header>

    <main class="container mx-auto p-6">
      <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Editar perfil</h2>
        <form action="/profile" method="post" class="space-y-4">
          <div>
            <label class="block text-sm">Nombre</label>
            <input name="name" class="w-full border rounded px-3 py-2" />
          </div>
          <div>
            <label class="block text-sm">Email</label>
            <input name="email" type="email" class="w-full border rounded px-3 py-2" />
          </div>
          <div class="text-right">
            <button class="bg-blue-600 text-white px-4 py-2 rounded">Guardar</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
